<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Onyx</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 32 32%22><rect width=%2232%22 height=%2232%22 rx=%228%22 fill=%22%2308090a%22/><path d=%22M13 10l9 6-9 6z%22 fill=%22%236fd6ff%22/></svg>" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

<header class="topbar">
  <a href="#/" class="logo" aria-label="Onyx home">
    <span class="logo-mark">▶</span>ONYX<span class="cursor">_</span>
  </a>

  <form id="search-form" class="search" role="search">
    <span class="search-prompt">&gt;</span>
    <input id="search-input" type="text" placeholder="search the backend" autocomplete="off" />
  </form>

  <span class="topbar-tag">no ads · no tracking · no account</span>
</header>

<main id="app" class="app"></main>

<template id="tpl-card">
  <a class="card" href="#">
    <div class="thumb">
      <img loading="lazy" />
      <span class="duration"></span>
    </div>
    <div class="meta">
      <h3 class="title"></h3>
      <p class="channel"></p>
      <p class="stats"></p>
    </div>
  </a>
</template>

<script src="app.js"></script>
</body>
</html>
